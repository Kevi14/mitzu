services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mitzu
      POSTGRES_USER: mitzu
      POSTGRES_PASSWORD: mitzu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mitzu -d mitzu"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-8001}:${BACKEND_PORT:-8001}"
    environment:
      # Docker networking uses the service name as host, not localhost
      DATABASE_URL: postgresql+asyncpg://mitzu:mitzu@postgres:5432/mitzu
      SYNC_DATABASE_URL: postgresql+psycopg2://mitzu:mitzu@postgres:5432/mitzu
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      COOKIE_NAME: ${COOKIE_NAME:-mitzu_session}
      BACKEND_PORT: ${BACKEND_PORT:-8001}
      CORS_ORIGINS: ${CORS_ORIGINS}
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
