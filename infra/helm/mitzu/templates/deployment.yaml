apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mitzu.fullname" . }}
  labels:
    app: mitzu-backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: mitzu-backend
  template:
    metadata:
      labels:
        app: mitzu-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "mitzu.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            - name: SYNC_DATABASE_URL
              value: "postgresql+psycopg2://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "mitzu.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mitzu.fullname" . }}-secret
                  key: jwt-secret
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
