target-version = "py312"
line-length = 100

[lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "B008",   # FastAPI Depends() calls in function defaults
    "SIM108", # ternary operator preference — personal taste
]

[lint.per-file-ignores]
"migrations/*" = ["F401"]

[format]
quote-style = "double"
indent-style = "space"
